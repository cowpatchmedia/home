<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cowpatch Media</title>
    <!-- Google Fonts: Roboto (was missing before) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stylesheets/modern-normalize.css">
    <link rel="stylesheet" href="stylesheets/styles.css">
  </head>
  <body>

    <!-- HEADER — sticky, always visible -->
    <header class="site-header">
      <a href="#" class="site-logo" id="home-btn">cowpatch media</a>
      <nav class="site-nav">
        <ul>
          <li><a href="#" id="about-btn">about me</a></li>
          <li><a href="#" id="resume-btn">resume</a></li>
        </ul>
      </nav>
    </header>

    <!-- HERO — background photo + tagline -->
    <section class="hero" id="hero">
      <div class="hero-text">
        <h1 class="hero-heading">exploring the world through multimedia projects.</h1>
      </div>
    </section>

    <!-- MAIN — tab buttons + swappable content area -->
    <main class="main-container" id="main">

      <!-- Tab buttons — text links -->      <div class="tab-bar" id="tab-bar">
        <button class="tab-btn" id="btn-music">music.</button>
        <button class="tab-btn" id="btn-photos">photos.</button>
        <button class="tab-btn" id="btn-games">games.</button>
      </div>

      <!-- Swappable content — hidden until a tab is clicked -->
      <div class="content-area" id="content-area" hidden></div>

    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      Copyright &copy; Cowpatch Media 2026
    </footer>

    <!-- MODULE OVERLAY (music / photos / games) -->
    <div class="module-overlay" id="module-overlay" role="dialog" aria-modal="true" hidden>
      <div class="module-modal">
        <button class="module-close" id="module-close" aria-label="Close">&times;</button>
        <div class="module-content" id="module-content"></div>
      </div>
    </div>

    <!-- RESUME MODAL OVERLAY -->
    <div class="resume-overlay" id="resume-overlay" role="dialog" aria-modal="true" aria-label="Resume" hidden>
      <div class="resume-modal">
        <button class="resume-close" id="resume-close" aria-label="Close resume">&times;</button>
        <div class="resume-frame-wrap" id="resume-frame-wrap"></div>
      </div>
    </div>

    <script src="scripts/scripts.js"></script>
  </body>
</html>
